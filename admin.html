<script>
const firebaseConfig = { ... }; // igual que antes
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// Variables globales (las mismas que tenías)
let placasCache = {}, conductoresCache = {}, busqPlaca = '', busqCond = '', editPlaca = null, editCond = null;

// Funciones auxiliares (las que ya tenías)
function pad(n) { ... }
function fmtDate(d) { ... }
function tick() { ... }
// ... todas las funciones de gestión de placas, conductores, zona, historial (las que ya estaban)

// Autenticación
auth.signInAnonymously().catch(e => console.error(e));
auth.onAuthStateChanged(async (user) => {
  if (user) {
    // Inicializar todo
    await cargarPlacas();
    await cargarConductores();
    await cargarZona();
    await cargarHistorial();
    // Configurar listeners de UI que dependen de datos
    document.getElementById('init-loading').style.display = 'none';
  } else {
    document.getElementById('loading-placas').innerHTML = 'Error de autenticación. Recarga la página.';
  }
});

// Mejora de la función limpiarHistorial (la que ya tenías, pero con doble confirmación)
window.limpiarHistorial = async function() {
  if (!confirm('⚠️ ¡ADVERTENCIA! Esto eliminará TODOS los registros de forma permanente.\n¿Estás completamente seguro?')) return;
  if (!confirm('Última oportunidad. Escribe "ELIMINAR" para confirmar.')) return;
  const code = prompt('Escribe ELIMINAR para continuar:');
  if (code !== 'ELIMINAR') return;
  try {
    const snap = await db.collection('registros').get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    await cargarHistorial();
    alert('Historial limpiado correctamente.');
  } catch(e) { alert('Error: '+e.message); }
};

// El resto de funciones (cargarPlacas, guardarPlaca, etc.) ya las tienes en tu admin.html actual,
// solo asegúrate de que todas accedan a `db` y que estén definidas después de la autenticación.
// Para mantener la compatibilidad, mantén el mismo código que tenías, pero sin la inicialización automática al cargar (ahora se hace después de auth).
</script>
